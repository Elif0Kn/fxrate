version: '3.8'  # Specify the Docker Compose version

services:
  # Spring Boot application service
  fxrate:
    image: Elif/fxrate:latest  # Use the image built from Dockerfile
    build:
      context: .  # Build context (current directory)
      dockerfile: Dockerfile  # Specify your Dockerfile if named differently
    ports:
      - "8080:8080"  # Expose the application on port 8080
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq  # RabbitMQ service name
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    depends_on:
      - rabbitmq  # Ensure RabbitMQ starts before the application

  # RabbitMQ service
  rabbitmq:
    image: rabbitmq:3-management  # Use RabbitMQ with management UI
    ports:
      - "5672:5672"    # Expose RabbitMQ port
      - "15672:15672"  # Expose RabbitMQ management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  # Hazelcast service
  hazelcast:
    image: hazelcast/hazelcast:5.0  # Hazelcast version
    ports:
      - "5701:5701"  # Default Hazelcast port
    environment:
      - HAZELCAST_CLUSTER_NAME=dev

